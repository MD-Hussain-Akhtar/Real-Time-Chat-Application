<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Realtime Chat & Video Call</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Premium Background Gradient Animation */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animated-bg {
            background: linear-gradient(-45deg, #09090b, #18181b, #022c22, #09090b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        /* Floating Animation for Chat Icon */
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>
<body class="animated-bg text-white h-screen w-screen flex items-center justify-center p-0 sm:p-6 overflow-hidden select-none font-sans">

    <div id="loginScreen" class="fixed inset-0 bg-black/40 backdrop-blur-2xl flex items-center justify-center p-4 z-50 transition-all duration-500">
        <div class="w-full max-w-md bg-zinc-900/70 backdrop-blur-3xl border border-zinc-800/80 rounded-[2.5rem] p-8 shadow-[0_0_50px_rgba(16,185,129,0.15)] transform transition-all duration-500 scale-100 hover:border-emerald-500/30">
            <div class="flex justify-center mb-6">
                <div class="w-24 h-24 rounded-full bg-gradient-to-tr from-emerald-500 to-teal-400 flex items-center justify-center text-5xl shadow-[0_0_30px_rgba(16,185,129,0.4)] animate-float">
                    💬
                </div>
            </div>
            <h1 class="text-4xl font-extrabold text-center bg-gradient-to-r from-white via-zinc-200 to-emerald-400 bg-clip-text text-transparent mb-2 tracking-tight">Group Chat</h1>
            <p class="text-zinc-400 text-center text-sm mb-8 font-medium">Apna naam enter karke group conversation join karein</p>
            
            <div class="relative mb-6 group">
                <input type="text" id="usernameInput" placeholder="Enter your name" class="w-full bg-zinc-950/60 border border-zinc-800 rounded-2xl px-5 py-4 text-white text-center text-lg focus:outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 transition-all duration-300 font-semibold tracking-wide placeholder-zinc-600 group-hover:border-zinc-700">
            </div>
            
            <button id="joinBtn" class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 active:scale-[0.98] text-white font-bold py-4 rounded-2xl transition-all duration-300 shadow-lg shadow-emerald-950/50 hover:shadow-emerald-500/20 tracking-wide text-lg flex items-center justify-center gap-2">
                Join Group Chat 🚀
            </button>
            <div class="mt-6 text-center text-xs text-zinc-500 tracking-wider font-medium uppercase">Connect instantly with friends</div>
        </div>
    </div>

    <div class="flex flex-col lg:flex-row w-full max-w-7xl h-full lg:h-[88vh] bg-zinc-950/60 backdrop-blur-xl sm:rounded-[2rem] shadow-[0_0_80px_rgba(0,0,0,0.6)] overflow-hidden sm:border border-zinc-800/60 transform transition-all duration-500">
        
        <div class="relative flex-1 bg-zinc-950 flex flex-col items-center justify-center min-h-[40vh] lg:min-h-0 overflow-hidden group">
            <div class="absolute inset-0 w-full h-full bg-zinc-950 z-0">
                <video id="remoteVideo" class="w-full h-full object-cover opacity-80 scale-100 transition-all duration-700 group-hover:scale-105" autoplay playsinline></video>
                
                <span id="remoteNameTag" class="absolute top-4 left-4 bg-zinc-900/80 px-4 py-2 rounded-2xl text-xs font-bold backdrop-blur-xl border border-zinc-800 tracking-wider text-emerald-400 shadow-lg flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-ping"></span>
                    Waiting for connection...
                </span>
            </div>
            
            <div class="absolute top-4 right-4 w-28 sm:w-44 aspect-video bg-zinc-900 rounded-2xl overflow-hidden border-2 border-emerald-500/80 shadow-[0_10px_30px_rgba(0,0,0,0.5)] z-20 transition-all duration-300 hover:scale-105 hover:border-emerald-400">
                <video id="localVideo" class="w-full h-full object-cover" autoplay playsinline muted></video>
                <span id="localNameTag" class="absolute bottom-2 left-2 bg-black/70 px-2.5 py-0.5 rounded-lg text-[10px] font-extrabold backdrop-blur-md tracking-wide text-zinc-300 border border-zinc-800">You</span>
            </div>
            
            <div class="absolute bottom-6 flex gap-4 bg-zinc-900/80 px-6 py-4 rounded-3xl backdrop-blur-2xl border border-zinc-800/80 z-30 shadow-[0_10px_40px_rgba(0,0,0,0.5)] transform transition-all duration-300 hover:border-zinc-700">
                <button id="startCallBtn" class="bg-gradient-to-r from-emerald-600 to-emerald-500 hover:from-emerald-500 hover:to-emerald-400 active:scale-95 text-white px-6 py-3 rounded-xl font-bold transition-all text-xs sm:text-sm tracking-wider shadow-lg shadow-emerald-950/50 hover:shadow-emerald-500/20 flex items-center gap-2">
                    <span>📞</span> Start Call
                </button>
                <button id="endCallBtn" class="bg-gradient-to-r from-rose-600 to-rose-500 hover:from-rose-500 hover:to-rose-400 active:scale-95 text-white px-6 py-3 rounded-xl font-bold transition-all text-xs sm:text-sm tracking-wider shadow-lg shadow-rose-950/50 hover:shadow-rose-500/20 flex items-center gap-2">
                    <span>❌</span> End Call
                </button>
            </div>
        </div>

        <div class="flex-[1.2] lg:flex-none lg:w-[420px] flex flex-col bg-zinc-900/40 border-t lg:border-t-0 lg:border-l border-zinc-800/60 h-[60vh] lg:h-full z-10 shadow-2xl">
            
            <div class="p-5 border-b border-zinc-800/60 flex items-center justify-between bg-zinc-900/60 backdrop-blur-md">
                <div class="flex items-center gap-3">
                    <span class="relative flex h-3 w-3">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                    </span>
                    <h3 class="font-bold text-base text-zinc-100 tracking-wide">Live Room Chat</h3>
                </div>
                <span id="userCountBadge" class="bg-emerald-500/10 text-emerald-400 text-xs font-bold px-3 py-1 rounded-full border border-emerald-500/20 backdrop-blur-md tracking-wide animate-pulse">
                    Online
                </span>
            </div>

            <div id="onlineUsersBar" class="flex gap-2 p-3 px-5 bg-zinc-950/40 border-b border-zinc-800/40 overflow-x-auto no-scrollbar text-xs font-semibold text-zinc-400">
                </div>

            <div id="chatMessages" class="flex-1 p-5 overflow-y-auto space-y-4 no-scrollbar bg-gradient-to-b from-transparent to-zinc-950/20">
                </div>

            <div class="p-4 border-t border-zinc-800/60 bg-zinc-950/80 sm:bg-zinc-900/40 backdrop-blur-xl flex gap-3 items-center">
                <input type="text" id="msgInput" placeholder="Type a professional message..." class="flex-1 bg-zinc-900/80 text-sm text-white px-5 py-4 rounded-2xl border border-zinc-800 focus:outline-none focus:border-emerald-500/80 focus:ring-4 focus:ring-emerald-500/5 transition-all duration-300 font-medium placeholder-zinc-600 shadow-inner">
                <button id="sendBtn" class="bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 active:scale-95 text-white px-6 py-4 rounded-2xl font-bold transition-all text-sm shadow-lg shadow-emerald-950/40 hover:shadow-emerald-500/20 tracking-wide">
                    Send
                </button>
            </div>
        </div>

    </div>

    <script src="js/main.js"></script>
    <script src="js/video.js"></script>
    <script src="js/shortcuts.js"></script>
</body>
</html>
